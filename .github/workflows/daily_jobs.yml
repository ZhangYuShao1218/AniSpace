name: Daily Scraper & Shopee Checker

on:
  schedule:
    # 每天早上 8:00 (UTC 00:00) 執行
    - cron: '0 0 * * *'
  workflow_dispatch: # 允許手動觸發測試

permissions:
  contents: write

jobs:
  daily-jobs:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Run Crawler & AI Translation
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npm run crawler

      - name: Run Shopee link checker and scraper
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scraper/shopee_checker.mjs

      - name: Send Summary Email
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        run: node scraper/email_report.mjs

      - name: Commit and Push changes
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add public/anime_data.json public/anime_data_old.json public/anime_data_backup_*.json public/custom_override.json public/affiliates.json public/product_images.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: 🔄 Auto-update anime data, shopee affiliate, and AI translations"
            git push
          fi
