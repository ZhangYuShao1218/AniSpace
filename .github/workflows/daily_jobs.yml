name: Daily Scraper & Shopee Checker

on:
  schedule:
    # 每天早上 10:50 (UTC 02:50) 執行，避開整點高峰期避免被 Github 延遲或取消
    - cron: '50 2 * * *'
  workflow_dispatch: # 允許手動觸發測試

permissions:
  contents: write

jobs:
  daily-jobs:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Run Complete Daily Automation & Send Email Report
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        run: npm run dailywork

      - name: Commit and Push changes
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add public/anime_data.json public/anime_data_old.json public/anime_data_backup_*.json public/custom_override.json public/bangumi_data.json public/bangumi_mapping_record.json public/affiliates.json public/product_images.json public/unlinked_anime_list.* public/data_version.json public/anime_meta/ scraper/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: 🔄 Auto-update anime data, shopee affiliate, and AI translations"
            git push
          fi
