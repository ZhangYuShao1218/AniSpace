<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="referrer" content="no-referrer">
  <title>動畫封面新舊對照預覽系統 (Cover Comparison Preview)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0a0c10;
      --bg-secondary: #12161f;
      --glass-bg: rgba(26, 32, 46, 0.6);
      --glass-border: rgba(255, 255, 255, 0.08);
      --text-primary: #f0f4f8;
      --text-secondary: #94a3b8;
      --accent-purple: #8b5cf6;
      --accent-cyan: #06b6d4;
      --accent-red: #ef4444;
      --accent-green: #10b981;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
      padding-bottom: 60px;
    }

    /* Ambient Glow Backgrounds */
    .ambient-blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      z-index: 0;
      pointer-events: none;
      opacity: 0.35;
    }
    .blob-1 {
      top: -100px;
      left: -100px;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, var(--accent-purple), transparent);
    }
    .blob-2 {
      bottom: -100px;
      right: -100px;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, var(--accent-cyan), transparent);
    }

    .container {
      position: relative;
      z-index: 10;
      max-width: 1600px;
      margin: 0 auto;
      padding: 30px 24px;
    }

    /* Navbar / Header */
    header {
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 24px 32px;
      margin-bottom: 32px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .badge-status {
      font-size: 0.85rem;
      padding: 6px 14px;
      background: rgba(139, 92, 246, 0.15);
      border: 1px solid rgba(139, 92, 246, 0.3);
      color: #ddd6fe;
      border-radius: 9999px;
      font-weight: 500;
    }

    /* Controls Bar */
    .controls {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
    }

    .search-box {
      flex: 1;
      min-width: 280px;
      position: relative;
    }

    .search-input {
      width: 100%;
      background: rgba(18, 22, 31, 0.8);
      border: 1px solid var(--glass-border);
      padding: 12px 18px 12px 42px;
      border-radius: 12px;
      color: #fff;
      font-size: 0.95rem;
      outline: none;
      transition: all 0.2s ease;
    }

    .search-input:focus {
      border-color: var(--accent-cyan);
      box-shadow: 0 0 15px rgba(6, 182, 212, 0.2);
    }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-secondary);
    }

    .stats-count {
      color: var(--text-secondary);
      font-size: 0.95rem;
    }
    .stats-count strong {
      color: var(--accent-cyan);
      font-size: 1.1rem;
    }

    /* Comparison Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(460px, 1fr));
      gap: 24px;
    }

    @media (max-width: 768px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }

    /* Card */
    .card {
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: 18px;
      padding: 20px;
      transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 32px rgba(0, 0, 0, 0.5);
      border-color: rgba(255, 255, 255, 0.18);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      padding-bottom: 12px;
    }

    .card-title-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
    }

    .card-idx {
      background: rgba(255, 255, 255, 0.08);
      color: var(--accent-cyan);
      font-size: 0.8rem;
      font-weight: 700;
      padding: 4px 8px;
      border-radius: 6px;
    }

    .card-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: #fff;
      line-height: 1.4;
    }

    .card-year {
      font-size: 0.8rem;
      color: #e2e8f0;
      background: rgba(6, 182, 212, 0.15);
      border: 1px solid rgba(6, 182, 212, 0.3);
      padding: 4px 10px;
      border-radius: 8px;
      white-space: nowrap;
    }

    /* Image Comparison Container */
    .compare-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .img-box {
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: rgba(0, 0, 0, 0.25);
      border-radius: 12px;
      padding: 10px;
      border: 1px solid rgba(255, 255, 255, 0.04);
    }

    .img-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.85rem;
      font-weight: 600;
    }

    .tag-old {
      color: var(--accent-red);
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .tag-new {
      color: var(--accent-green);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .source-badge {
      font-size: 0.7rem;
      padding: 2px 6px;
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.07);
      color: var(--text-secondary);
    }

    .img-wrapper {
      position: relative;
      width: 100%;
      padding-top: 140%; /* 3:4 Aspect Ratio */
      border-radius: 8px;
      overflow: hidden;
      background: #151922;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .img-wrapper img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s ease;
    }

    .img-wrapper:hover img {
      transform: scale(1.06);
    }

    .img-error {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--accent-red);
      font-size: 0.8rem;
      text-align: center;
      padding: 12px;
      background: rgba(239, 68, 68, 0.05);
    }

    .url-text {
      font-size: 0.72rem;
      color: var(--text-secondary);
      word-break: break-all;
      line-height: 1.3;
      max-height: 2.6em;
      overflow: hidden;
      text-overflow: ellipsis;
      font-family: monospace;
    }

    /* Loading state */
    .loading {
      text-align: center;
      padding: 80px 0;
      font-size: 1.2rem;
      color: var(--text-secondary);
    }
  </style>
</head>
<body>
  <div class="ambient-blob blob-1"></div>
  <div class="ambient-blob blob-2"></div>

  <div class="container">
    <header>
      <div class="header-top">
        <h1>
          <span>⚡ 動畫封面新舊差異快速對照系統</span>
          <span class="badge-status">測試預覽專用 (不干擾主程式)</span>
        </h1>
        <div class="stats-count" id="statsDisplay">正在載入並比對資料庫...</div>
      </div>
      <div class="controls">
        <div class="search-box">
          <span class="search-icon">🔍</span>
          <input type="text" id="searchInput" class="search-input" placeholder="輸入作品名稱或關鍵字快速篩選 (例如：刀使巫女、銀魂)...">
        </div>
      </div>
    </header>

    <div id="loading" class="loading">⏳ 正在同步讀取舊庫與新庫資料，為您生成視覺對照卡片...</div>
    <div class="grid" id="cardGrid"></div>
  </div>

  <script>
    let allComparisons = [];

    function getSourceLabel(url) {
      if (!url) return '無網址';
      if (url.includes('hdslb.com')) return 'Bilibili (防盜鏈)';
      if (url.includes('lain.bgm.tv')) return 'Bangumi';
      if (url.includes('anilist.co')) return 'AniList 高清';
      if (url.includes('bahamut.com.tw')) return '巴哈姆特';
      return url.startsWith('http://') ? 'HTTP 不安全' : 'HTTPS CDN';
    }

    async function init() {
      try {
        const [oldRes, newRes] = await Promise.all([
          fetch('/anime_data_backup_before_classics.json'),
          fetch('/anime_data.json')
        ]);

        const oldList = await oldRes.json();
        const newList = await newRes.json();

        // Map old items by ID and title
        const oldMap = new Map();
        oldList.forEach(item => {
          if (item.id) oldMap.set(item.id, item);
          oldMap.set(item.titleZh, item);
        });

        newList.forEach(newItem => {
          const oldItem = oldMap.get(newItem.id) || oldMap.get(newItem.titleZh);
          const oldImg = oldItem ? (oldItem.coverImage || '') : '';
          const newImg = newItem.coverImage || '';
          const isNew = !oldItem;
          const isHidden = newItem.show === false;

          allComparisons.push({
            id: newItem.id || Math.random(),
            titleZh: (newItem.titleZh || '未知名稱') + (isHidden ? ' 🙈[設定隱藏]' : '') + (isNew ? ' ✨[全新收錄]' : ''),
            yearSeason: newItem.yearSeason || '未知',
            oldImg: oldImg,
            newImg: newImg,
            isNew: isNew
          });
        });

        document.getElementById('loading').style.display = 'none';
        updateStats(allComparisons.length);
        renderCards(allComparisons);

        document.getElementById('searchInput').addEventListener('input', (e) => {
          const q = e.target.value.trim().toLowerCase();
          const filtered = allComparisons.filter(c => c.titleZh.toLowerCase().includes(q) || c.yearSeason.toLowerCase().includes(q));
          updateStats(filtered.length, allComparisons.length);
          renderCards(filtered);
        });

      } catch (err) {
        document.getElementById('loading').innerHTML = `❌ 載入失敗：請確定您正透過 Vite 開發伺服器瀏覽器前往此頁面<br><small style="color:#ef4444">${err.message}</small>`;
      }
    }

    function updateStats(current, total = null) {
      const el = document.getElementById('statsDisplay');
      if (total !== null && current !== total) {
        el.innerHTML = `篩選顯示：<strong>${current}</strong> 筆 (全庫資料共 ${total} 筆)`;
      } else {
        el.innerHTML = `全庫完整瀏覽：共 <strong>${current}</strong> 筆動畫資料 (可搜尋標題確認異動與封面狀態)`;
      }
    }

    function renderCards(list) {
      const grid = document.getElementById('cardGrid');
      if (list.length === 0) {
        grid.innerHTML = `<div style="grid-column: 1/-1; text-align:center; padding: 60px; color:#94a3b8;">查無符合關鍵字的對照作品</div>`;
        return;
      }

      grid.innerHTML = list.map((item, index) => `
        <div class="card">
          <div class="card-header">
            <div class="card-title-wrap">
              <span class="card-idx">#${String(index + 1).padStart(4, '0')}</span>
              <h2 class="card-title">${item.titleZh}</h2>
            </div>
            <span class="card-year">${item.yearSeason}</span>
          </div>

          <div class="compare-container">
            <!-- 舊圖 -->
            <div class="img-box">
              <div class="img-header">
                <span class="tag-old">${item.isNew ? '⚪ 原無此筆' : '🔴 舊圖 (修正前)'}</span>
                <span class="source-badge">${item.isNew ? '新增項目' : getSourceLabel(item.oldImg)}</span>
              </div>
              <div class="img-wrapper">
                ${item.oldImg ? `<img src="${item.oldImg}" referrerpolicy="no-referrer" alt="舊封面" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">` : `<div style="display:flex; align-items:center; justify-content:center; height:100%; color:#64748b; font-size:14px;">✨ 本次全新追加收錄神作</div>`}
                <div class="img-error" style="display:none;">
                  <span>⚠️ 載入失敗 / B站防盜鏈阻擋 (403)</span>
                </div>
              </div>
              <div class="url-text" title="${item.oldImg}">${item.oldImg}</div>
            </div>

            <!-- 新圖 -->
            <div class="img-box">
              <div class="img-header">
                <span class="tag-new">🟢 新圖 (升級後)</span>
                <span class="source-badge">${getSourceLabel(item.newImg)}</span>
              </div>
              <div class="img-wrapper">
                <img src="${item.newImg}" referrerpolicy="no-referrer" alt="新封面" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                <div class="img-error" style="display:none;">
                  <span>⚠️ 新封面載入錯誤</span>
                </div>
              </div>
              <div class="url-text" title="${item.newImg}">${item.newImg}</div>
            </div>
          </div>
        </div>
      `).join('');
    }

    window.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
